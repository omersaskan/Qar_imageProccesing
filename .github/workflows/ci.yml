name: CI — Meshysiz Asset Factory

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    - name: Run full test suite
      run: |
        python -m pytest \
          modules/shared_contracts/tests \
          modules/capture_workflow/tests \
          modules/reconstruction_engine/tests \
          modules/asset_cleanup_pipeline/tests \
          modules/export_pipeline/tests \
          modules/qa_validation/tests \
          modules/asset_registry/tests \
          modules/operations/tests \
          modules/utils/tests \
          modules/tests/test_phase6_integration.py \
          modules/tests/test_smoke_flow.py \
          modules/tests/test_phase7_edge_cases.py \
          modules/tests/test_worker_finalize_flow.py \
          modules/tests/test_worker_import.py \
          tests/test_worker_failure_flow.py \
          tests/test_mask_alignment.py \
          tests/test_sprint1_integration.py \
          tests/test_sprint2_integration.py \
          tests/test_sprint3_integration.py
