name: Build and Push Reconstruction Image

on:
  push:
    branches: [ "main", "production" ]
    paths:
      - 'Dockerfile.runpod'
      - '.dockerignore'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'modules/reconstruction_engine/**'
      - 'modules/operations/**'
      - 'modules/capture_workflow/**'
      - 'modules/export_pipeline/**'
      - 'modules/qa_validation/**'
      - 'modules/asset_cleanup_pipeline/**'
      - 'modules/asset_registry/**'
      - 'modules/shared_contracts/**'
      - 'modules/utils/**'
      - 'smoke_check.sh'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.runpod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Caching to speed up COLMAP/OpenMVS source builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
