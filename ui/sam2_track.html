<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SAM2 Manual Track — Meshysiz</title>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 24px; background: #0e0f12; color: #e9e9ec; }
  .container { max-width: 1200px; margin: 0 auto; }
  h1 { margin: 0 0 6px; font-size: 1.4rem; }
  p.muted { color: #888; margin: 0 0 18px; font-size: 0.92rem; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  input[type="text"], input[type="number"] {
    padding: 9px 12px; background: #1a1c20; color: #e9e9ec;
    border: 1px solid #2a2d33; border-radius: 6px; font: inherit; width: 320px;
  }
  input[type="number"] { width: 90px; }
  button {
    padding: 9px 16px; background: #2563eb; color: white;
    border: none; border-radius: 6px; font: inherit; cursor: pointer;
  }
  button.secondary { background: #2a2d33; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button:hover:not(:disabled) { filter: brightness(1.1); }
  .canvas-wrap {
    position: relative; display: inline-block;
    border: 1px solid #2a2d33; border-radius: 6px; overflow: hidden;
    background: #000; max-width: 100%;
  }
  canvas { display: block; cursor: crosshair; max-width: 100%; height: auto; }
  .legend { display: flex; gap: 16px; margin: 8px 0 16px; font-size: 0.88rem; color: #aaa; }
  .legend span::before { content: "■ "; color: var(--c); }
  .status {
    margin-top: 16px; padding: 12px 14px; background: #14161a;
    border-left: 3px solid #2563eb; border-radius: 4px;
    font-family: ui-monospace, "Cascadia Code", monospace;
    font-size: 0.85rem; white-space: pre-wrap; max-height: 360px; overflow: auto;
  }
  .status.error { border-left-color: #ef4444; }
  .status.ok { border-left-color: #22c55e; }
  .modes { display: flex; gap: 6px; margin-bottom: 14px; }
  .modes button { padding: 6px 12px; background: #1a1c20; border: 1px solid #2a2d33; }
  .modes button.active { background: #2563eb; border-color: #2563eb; }
</style>
</head>
<body>
<div class="container">
  <h1>SAM2 Manual Track</h1>
  <p class="muted">
    Operatör ürün etrafına <b>bbox çizer</b> veya <b>tıklar</b>;
    SAM2 video predictor tüm frame'lerin maskelerini üretir.
    Maskeler <code>data/captures/&lt;session&gt;/frames/masks/</code> altına yazılır.
  </p>

  <div class="row">
    <input type="text" id="session-id" placeholder="Session ID (örn: sess_abc123)">
    <input type="number" id="seed-frame" value="0" min="0" title="Seed frame index">
    <button id="load">Load Frame</button>
  </div>

  <div class="modes">
    <button data-mode="bbox" class="active">Mode: BBox</button>
    <button data-mode="point-fg">Mode: Point (foreground)</button>
    <button data-mode="point-bg">Mode: Point (background)</button>
  </div>

  <div class="legend">
    <span style="--c:#22c55e">BBox</span>
    <span style="--c:#3b82f6">Foreground point</span>
    <span style="--c:#ef4444">Background point</span>
  </div>

  <div class="canvas-wrap" id="canvas-wrap" style="display:none">
    <canvas id="canvas"></canvas>
  </div>

  <div class="row" style="margin-top:14px">
    <button id="track" disabled>Track (SAM2 Video Propagation)</button>
    <button id="clear" class="secondary">Clear Prompts</button>
  </div>

  <div class="status" id="status">Hazır.</div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const status = $('status');

let img = null;
let bbox = null;            // [x1, y1, x2, y2]
let points = [];            // [{x, y, label}]
let drag = null;            // {start, current}
let mode = 'bbox';          // 'bbox' | 'point-fg' | 'point-bg'

const canvas = $('canvas');
const ctx = canvas.getContext('2d');

document.querySelectorAll('.modes button').forEach(b => {
  b.onclick = () => {
    mode = b.dataset.mode;
    document.querySelectorAll('.modes button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
  };
});

function setStatus(msg, kind = '') {
  status.textContent = msg;
  status.className = 'status' + (kind ? ' ' + kind : '');
}

function clientToCanvas(e) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - r.left) * (canvas.width / r.width),
    y: (e.clientY - r.top) * (canvas.height / r.height),
  };
}

function redraw() {
  if (!img) return;
  ctx.drawImage(img, 0, 0);
  if (bbox) {
    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = 3;
    ctx.strokeRect(bbox[0], bbox[1], bbox[2] - bbox[0], bbox[3] - bbox[1]);
  }
  for (const p of points) {
    ctx.fillStyle = p.label === 1 ? '#3b82f6' : '#ef4444';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function refreshTrackBtn() {
  $('track').disabled = !(bbox || points.length > 0);
}

canvas.onmousedown = (e) => {
  const p = clientToCanvas(e);
  if (mode === 'bbox') {
    drag = { start: p, current: p };
  } else if (mode === 'point-fg') {
    points.push({ x: p.x, y: p.y, label: 1 });
  } else if (mode === 'point-bg') {
    points.push({ x: p.x, y: p.y, label: 0 });
  }
  redraw();
  refreshTrackBtn();
};

canvas.onmousemove = (e) => {
  if (!drag) return;
  drag.current = clientToCanvas(e);
  bbox = [
    Math.min(drag.start.x, drag.current.x),
    Math.min(drag.start.y, drag.current.y),
    Math.max(drag.start.x, drag.current.x),
    Math.max(drag.start.y, drag.current.y),
  ];
  redraw();
};

canvas.onmouseup = canvas.onmouseleave = () => {
  if (drag && bbox) {
    const w = bbox[2] - bbox[0], h = bbox[3] - bbox[1];
    if (w < 8 || h < 8) bbox = null;
  }
  drag = null;
  refreshTrackBtn();
};

$('load').onclick = () => {
  const sid = $('session-id').value.trim();
  if (!sid) { setStatus('Session ID gerekli.', 'error'); return; }
  setStatus('Loading first frame...');
  img = new Image();
  img.onload = () => {
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    $('canvas-wrap').style.display = 'inline-block';
    bbox = null;
    points = [];
    redraw();
    refreshTrackBtn();
    setStatus(`Loaded ${img.naturalWidth}×${img.naturalHeight}. Mode '${mode}' ile çiz.`, 'ok');
  };
  img.onerror = () => setStatus(`Frame yüklenemedi: /api/sessions/${sid}/first-frame`, 'error');
  img.src = `/api/sessions/${encodeURIComponent(sid)}/first-frame?ts=${Date.now()}`;
};

$('clear').onclick = () => {
  bbox = null;
  points = [];
  redraw();
  refreshTrackBtn();
  setStatus('Prompts temizlendi.');
};

$('track').onclick = async () => {
  const sid = $('session-id').value.trim();
  if (!sid) return;
  $('track').disabled = true;
  setStatus('SAM2 video propagation çalışıyor (her frame için inference)...');

  const body = { seed_frame_idx: parseInt($('seed-frame').value || '0', 10) };
  if (bbox) body.seed_box = bbox.map(v => Math.round(v));
  if (points.length > 0) {
    body.seed_points = points.map(p => [Math.round(p.x), Math.round(p.y)]);
    body.seed_labels = points.map(p => p.label);
  }

  try {
    const res = await fetch(`/api/sessions/${encodeURIComponent(sid)}/sam2_track`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) {
      setStatus('HATA: ' + (data.detail || res.statusText), 'error');
      $('track').disabled = false;
      return;
    }
    const ratio = data.expected_frame_count
      ? `${data.masks_generated}/${data.expected_frame_count}`
      : `${data.masks_generated}`;
    setStatus(
      `Tamamlandı.\n` +
      `  masks_generated: ${ratio}\n` +
      `  failed: ${data.video_propagation_failed}\n` +
      `  masks_dir: ${data.masks_dir}\n\n` +
      JSON.stringify(data.status, null, 2),
      data.video_propagation_failed ? 'error' : 'ok'
    );
    $('track').disabled = false;
  } catch (e) {
    setStatus('HATA: ' + e.message, 'error');
    $('track').disabled = false;
  }
};
</script>
</body>
</html>
